[defaults]
# Allow Ansible to create world-readable temp files when becoming unprivileged user
# This is required for privilege escalation to work with become_user
# Safe in CI/CD context where user directories are isolated
allow_world_readable_tmpfiles = True

# Disable SSH host key checking for CI/CD
host_key_checking = False

# Suppress deprecation warnings
deprecation_warnings = False

# Use more efficient SSH connection method
[ssh_connection]
pipelining = True
