---
# React Vite Role - Main Tasks

- name: Install Node.js
  apt:
    name:
      - nodejs
      - npm
    state: present

- name: Create frontend directory
  file:
    path: "{{ frontend_dir }}"
    state: directory
    owner: "{{ app_user }}"
    mode: '0755'

- name: Copy built frontend from clone directory
  synchronize:
    src: "{{ clone_dir }}/frontend/dist/"
    dest: "{{ frontend_dir }}/"
    delete: yes
    recursive: yes
    private_key: "{{ ansible_ssh_private_key_file }}"
    use_ssh_args: yes
    rsync_path: "sudo rsync"
  delegate_to: localhost
  become: no

- name: Fix frontend directory ownership
  file:
    path: "{{ frontend_dir }}"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    recurse: yes
