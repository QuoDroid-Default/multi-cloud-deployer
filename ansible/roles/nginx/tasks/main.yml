---
# Nginx Role - Main Tasks

- name: Install Nginx
  apt:
    name: nginx
    state: present

- name: Configure Nginx
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/app
    mode: '0644'
  notify: restart nginx

- name: Enable site
  file:
    src: /etc/nginx/sites-available/app
    dest: /etc/nginx/sites-enabled/app
    state: link

- name: Remove default site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Start Nginx
  systemd:
    name: nginx
    state: started
    enabled: yes

handlers:
  - name: restart nginx
    systemd:
      name: nginx
      state: restarted
