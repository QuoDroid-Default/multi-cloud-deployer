---
# Python Django Role - Main Tasks

- name: Install system dependencies
  apt:
    name:
      - python3
      - python3-pip
      - python3-venv
      - python3-dev
      - build-essential
      - libpq-dev
      - nginx
      - supervisor
      - rsync
      - git
    state: present
    update_cache: yes

- name: Create app user
  user:
    name: "{{ app_user }}"
    shell: /bin/bash
    create_home: yes

- name: Create application directory
  file:
    path: "{{ backend_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'

- name: Copy backend code from clone directory
  synchronize:
    src: "{{ clone_dir }}/backend/"
    dest: "{{ backend_dir }}/"
    delete: yes
    recursive: yes
    private_key: "{{ ansible_ssh_private_key_file }}"
    use_ssh_args: yes
    rsync_path: "sudo rsync"
  delegate_to: localhost
  become: no

- name: Fix backend directory ownership
  file:
    path: "{{ backend_dir }}"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    recurse: yes

- name: Determine environment-specific settings
  set_fact:
    env_file_source: "{{ '.env.prod.example' if env_name == 'prod' else '.env.dev.example' }}"
    env_file_dest: "{{ '.env.prod' if env_name == 'prod' else '.env.dev' }}"
    is_prod: "{{ env_name == 'prod' }}"

- name: Copy .env example file as base
  copy:
    src: "{{ backend_dir }}/{{ env_file_source }}"
    dest: "{{ backend_dir }}/{{ env_file_dest }}"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0600'
    remote_src: yes

- name: Generate Django secret key
  set_fact:
    generated_secret_key: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=50') }}"

- name: Build ALLOWED_HOSTS and CORS origins
  set_fact:
    allowed_hosts_list: "{{ ansible_host }},localhost,127.0.0.1,.cloudfront.net{% if cdn_domain is defined and cdn_domain %},{{ cdn_domain }}{% endif %}"
    cors_origins: "http://{{ ansible_host }}{% if cdn_domain is defined and cdn_domain %},https://{{ cdn_domain }}{% endif %}"
    frontend_url: "{% if cdn_domain is defined and cdn_domain %}https://{{ cdn_domain }}{% else %}http://{{ ansible_host }}{% endif %}"

- name: Extract Claude OAuth token from existing .env.dev (non-prod only)
  shell: grep '^CLAUDE_CODE_OAUTH_TOKEN=' "{{ backend_dir }}/.env.dev" | cut -d'=' -f2
  register: claude_token_result
  when: not is_prod and backend_dir is defined
  ignore_errors: yes
  become: yes
  become_user: "{{ app_user }}"

- name: Set Claude OAuth token variable
  set_fact:
    claude_oauth_token: "{{ claude_token_result.stdout if (claude_token_result is defined and claude_token_result.stdout is defined and claude_token_result.stdout != '') else '' }}"
  when: not is_prod

- name: Populate Django settings in .env file
  lineinfile:
    path: "{{ backend_dir }}/{{ env_file_dest }}"
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0600'
  loop:
    - { regexp: '^SECRET_KEY=', line: 'SECRET_KEY={{ generated_secret_key }}' }
    - { regexp: '^ALLOWED_HOSTS=', line: 'ALLOWED_HOSTS={{ allowed_hosts_list }}' }
    - { regexp: '^DB_NAME=', line: 'DB_NAME={{ database_name }}' }
    - { regexp: '^DB_USER=', line: 'DB_USER={{ database_user }}' }
    - { regexp: '^DB_PASSWORD=', line: 'DB_PASSWORD={{ database_password }}' }
    - { regexp: '^DB_HOST=', line: 'DB_HOST={{ database_host }}' }
    - { regexp: '^DB_PORT=', line: 'DB_PORT={{ database_port }}' }
    - { regexp: '^REDIS_URL=', line: 'REDIS_URL=redis://{{ cache_host }}:{{ cache_port }}/0' }
    - { regexp: '^EXTRA_CORS_ORIGINS=', line: 'EXTRA_CORS_ORIGINS={{ cors_origins }}' }
    - { regexp: '^EXTRA_CSRF_ORIGINS=', line: 'EXTRA_CSRF_ORIGINS={{ cors_origins }}' }
    - { regexp: '^FRONTEND_URL=', line: 'FRONTEND_URL={{ frontend_url }}' }
    - { regexp: '^WEBAPP_ORIGIN=', line: 'WEBAPP_ORIGIN={{ frontend_url }}' }

- name: Populate Claude OAuth token (non-prod only)
  lineinfile:
    path: "{{ backend_dir }}/{{ env_file_dest }}"
    regexp: '^CLAUDE_CODE_OAUTH_TOKEN='
    line: 'CLAUDE_CODE_OAUTH_TOKEN={{ claude_oauth_token }}'
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0600'
  when: not is_prod and claude_oauth_token is defined and claude_oauth_token != ''

- name: Create .env symlink to environment-specific file
  file:
    src: "{{ backend_dir }}/{{ env_file_dest }}"
    dest: "{{ backend_dir }}/.env"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    state: link
    force: yes

- name: Create production settings override
  template:
    src: settings_prod.py.j2
    dest: "{{ backend_dir }}/copilot_orchestrator/settings_prod.py"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0644'

- name: Create Python virtual environment
  command: python3 -m venv {{ backend_dir }}/venv
  args:
    creates: "{{ backend_dir }}/venv/bin/activate"
  become: yes
  become_user: "{{ app_user }}"

- name: Install Python dependencies
  pip:
    requirements: "{{ backend_dir }}/requirements.txt"
    virtualenv: "{{ backend_dir }}/venv"
  become: yes
  become_user: "{{ app_user }}"

- name: Install Node.js and npm (for Claude CLI in non-prod)
  apt:
    name:
      - nodejs
      - npm
    state: present
    update_cache: yes
  when: env_name != 'prod'

- name: Install Claude CLI via npm (non-prod only)
  npm:
    name: "@anthropic-ai/claude-code"
    global: yes
    state: present
  when: env_name != 'prod'

- name: Create .claude directory for credentials (non-prod only)
  file:
    path: "/home/{{ app_user }}/.claude"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0700'
  when: env_name != 'prod'

- name: Restore Claude credentials from GitHub Secret (non-prod only)
  copy:
    content: "{{ claude_credentials_json | b64decode }}"
    dest: "/home/{{ app_user }}/.claude/.credentials.json"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0600'
  when: env_name != 'prod' and claude_credentials_json is defined and claude_credentials_json != ''

- name: Create static files directory
  file:
    path: "{{ backend_dir }}/staticfiles"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'

- name: Create media files directory
  file:
    path: "{{ backend_dir }}/media"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'

- name: Create workspace directories
  file:
    path: "{{ backend_dir }}/data/{{ item }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'
  loop:
    - projects
    - workspaces

- name: Wait for database to be ready
  command: >
    {{ backend_dir }}/venv/bin/python -c
    "import psycopg2; psycopg2.connect(
    host='{{ database_host }}',
    port={{ database_port }},
    user='{{ database_user }}',
    password='{{ database_password }}',
    dbname='{{ database_name }}'
    ).close()"
  register: db_check
  until: db_check.rc == 0
  retries: 30
  delay: 10
  become: yes
  become_user: "{{ app_user }}"

- name: Run Django migrations
  django_manage:
    command: migrate
    app_path: "{{ backend_dir }}"
    virtualenv: "{{ backend_dir }}/venv"
  become: yes
  become_user: "{{ app_user }}"
  environment:
    DJANGO_SETTINGS_MODULE: "{{ django_settings_module }}"
    DB_NAME: "{{ database_name }}"
    DB_USER: "{{ database_user }}"
    DB_PASSWORD: "{{ database_password }}"
    DB_HOST: "{{ database_host }}"
    DB_PORT: "{{ database_port }}"
    REDIS_URL: "redis://{{ cache_host }}:{{ cache_port }}/0"
    SECRET_KEY: "{{ django_secret_key }}"
    ALLOWED_HOSTS: "{{ django_allowed_hosts }}"
    DEBUG: "False"
    STATIC_ROOT: "{{ backend_dir }}/staticfiles"
    MEDIA_ROOT: "{{ backend_dir }}/media"

- name: Collect static files
  django_manage:
    command: collectstatic --noinput
    app_path: "{{ backend_dir }}"
    virtualenv: "{{ backend_dir }}/venv"
  become: yes
  become_user: "{{ app_user }}"
  environment:
    DJANGO_SETTINGS_MODULE: "{{ django_settings_module }}"
    DB_NAME: "{{ database_name }}"
    DB_USER: "{{ database_user }}"
    DB_PASSWORD: "{{ database_password }}"
    DB_HOST: "{{ database_host }}"
    DB_PORT: "{{ database_port }}"
    REDIS_URL: "redis://{{ cache_host }}:{{ cache_port }}/0"
    SECRET_KEY: "{{ django_secret_key }}"
    ALLOWED_HOSTS: "{{ django_allowed_hosts }}"
    DEBUG: "False"
    STATIC_ROOT: "{{ backend_dir }}/staticfiles"
    MEDIA_ROOT: "{{ backend_dir }}/media"

- name: Create systemd service files
  template:
    src: "{{ item }}.service.j2"
    dest: "/etc/systemd/system/{{ item }}.service"
    mode: '0644'
  loop:
    - coco-daphne
    - coco-celery-worker
    - coco-celery-beat
    - coco-grpc-agent
  notify:
    - reload systemd
    - restart services

- name: Enable and restart services
  systemd:
    name: "{{ item }}"
    enabled: yes
    state: restarted
    daemon_reload: yes
  loop:
    - coco-daphne
    - coco-celery-worker
    - coco-celery-beat
    - coco-grpc-agent
  ignore_errors: yes
