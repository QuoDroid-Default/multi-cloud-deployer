---
# Python Django Role - Main Tasks

- name: Install system dependencies
  apt:
    name:
      - python3
      - python3-pip
      - python3-venv
      - python3-dev
      - build-essential
      - libpq-dev
      - nginx
      - supervisor
      - rsync
      - git
    state: present
    update_cache: yes

- name: Create app user
  user:
    name: "{{ app_user }}"
    shell: /bin/bash
    create_home: yes

- name: Create application directory
  file:
    path: "{{ backend_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'

- name: Copy backend code from clone directory
  synchronize:
    src: "{{ clone_dir }}/backend/"
    dest: "{{ backend_dir }}/"
    delete: yes
    recursive: yes
    private_key: "{{ ansible_ssh_private_key_file }}"
    use_ssh_args: yes
    rsync_path: "sudo rsync"
  delegate_to: localhost
  become: no

- name: Fix backend directory ownership
  file:
    path: "{{ backend_dir }}"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    recurse: yes

- name: Determine which .env file to use
  set_fact:
    env_file_name: "{{ '.env.prod' if env_name == 'prod' else '.env.dev' }}"

- name: Copy appropriate .env file for environment
  copy:
    src: "{{ backend_dir }}/{{ env_file_name }}"
    dest: "{{ backend_dir }}/.env"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0600'
    remote_src: yes

- name: Create production settings override
  template:
    src: settings_prod.py.j2
    dest: "{{ backend_dir }}/copilot_orchestrator/settings_prod.py"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0644'

- name: Create Python virtual environment
  command: python3 -m venv {{ backend_dir }}/venv
  args:
    creates: "{{ backend_dir }}/venv/bin/activate"
  become: yes
  become_user: "{{ app_user }}"

- name: Install Python dependencies
  pip:
    requirements: "{{ backend_dir }}/requirements.txt"
    virtualenv: "{{ backend_dir }}/venv"
  become: yes
  become_user: "{{ app_user }}"

- name: Install Node.js and npm (for Claude CLI in non-prod)
  apt:
    name:
      - nodejs
      - npm
    state: present
    update_cache: yes
  when: env_name != 'prod'

- name: Install Claude CLI via npm (non-prod only)
  npm:
    name: "@anthropic-ai/claude-code"
    global: yes
    state: present
  when: env_name != 'prod'

- name: Create static files directory
  file:
    path: "{{ backend_dir }}/staticfiles"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'

- name: Create media files directory
  file:
    path: "{{ backend_dir }}/media"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'

- name: Create workspace directories
  file:
    path: "{{ backend_dir }}/data/{{ item }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'
  loop:
    - projects
    - workspaces

- name: Wait for database to be ready
  command: >
    {{ backend_dir }}/venv/bin/python -c
    "import psycopg2; psycopg2.connect(
    host='{{ database_host }}',
    port={{ database_port }},
    user='{{ database_user }}',
    password='{{ database_password }}',
    dbname='{{ database_name }}'
    ).close()"
  register: db_check
  until: db_check.rc == 0
  retries: 30
  delay: 10
  become: yes
  become_user: "{{ app_user }}"

- name: Run Django migrations
  django_manage:
    command: migrate
    app_path: "{{ backend_dir }}"
    virtualenv: "{{ backend_dir }}/venv"
  become: yes
  become_user: "{{ app_user }}"
  environment:
    DJANGO_SETTINGS_MODULE: "{{ django_settings_module }}"
    DB_NAME: "{{ database_name }}"
    DB_USER: "{{ database_user }}"
    DB_PASSWORD: "{{ database_password }}"
    DB_HOST: "{{ database_host }}"
    DB_PORT: "{{ database_port }}"
    REDIS_URL: "redis://{{ cache_host }}:{{ cache_port }}/0"
    SECRET_KEY: "{{ django_secret_key }}"
    ALLOWED_HOSTS: "{{ django_allowed_hosts }}"
    DEBUG: "False"
    STATIC_ROOT: "{{ backend_dir }}/staticfiles"
    MEDIA_ROOT: "{{ backend_dir }}/media"

- name: Collect static files
  django_manage:
    command: collectstatic --noinput
    app_path: "{{ backend_dir }}"
    virtualenv: "{{ backend_dir }}/venv"
  become: yes
  become_user: "{{ app_user }}"
  environment:
    DJANGO_SETTINGS_MODULE: "{{ django_settings_module }}"
    DB_NAME: "{{ database_name }}"
    DB_USER: "{{ database_user }}"
    DB_PASSWORD: "{{ database_password }}"
    DB_HOST: "{{ database_host }}"
    DB_PORT: "{{ database_port }}"
    REDIS_URL: "redis://{{ cache_host }}:{{ cache_port }}/0"
    SECRET_KEY: "{{ django_secret_key }}"
    ALLOWED_HOSTS: "{{ django_allowed_hosts }}"
    DEBUG: "False"
    STATIC_ROOT: "{{ backend_dir }}/staticfiles"
    MEDIA_ROOT: "{{ backend_dir }}/media"

- name: Create systemd service files
  template:
    src: "{{ item }}.service.j2"
    dest: "/etc/systemd/system/{{ item }}.service"
    mode: '0644'
  loop:
    - coco-daphne
    - coco-celery-worker
    - coco-celery-beat
    - coco-grpc-agent
  notify:
    - reload systemd
    - restart services

- name: Enable and restart services
  systemd:
    name: "{{ item }}"
    enabled: yes
    state: restarted
    daemon_reload: yes
  loop:
    - coco-daphne
    - coco-celery-worker
    - coco-celery-beat
    - coco-grpc-agent
