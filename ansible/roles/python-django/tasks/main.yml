---
# Python Django Role - Main Tasks

- name: Install system dependencies
  apt:
    name:
      - python3
      - python3-pip
      - python3-venv
      - python3-dev
      - build-essential
      - libpq-dev
      - nginx
      - supervisor
      - rsync
      - git
      - jq
    state: present
    update_cache: yes

- name: Create app user
  user:
    name: "{{ app_user }}"
    shell: /bin/bash
    create_home: yes

- name: Create application directory
  file:
    path: "{{ backend_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'

- name: Copy backend code from clone directory
  synchronize:
    src: "{{ clone_dir }}/backend/"
    dest: "{{ backend_dir }}/"
    delete: yes
    recursive: yes
    private_key: "{{ ansible_ssh_private_key_file }}"
    use_ssh_args: yes
    rsync_path: "sudo rsync"
  delegate_to: localhost
  become: no

- name: Fix backend directory ownership
  file:
    path: "{{ backend_dir }}"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    recurse: yes

- name: Determine environment-specific settings
  set_fact:
    env_file_source: "{{ '.env.prod.example' if env_name == 'prod' else '.env.dev.example' }}"
    env_file_dest: "{{ '.env.prod' if env_name == 'prod' else '.env.dev' }}"
    is_prod: "{{ env_name == 'prod' }}"

- name: Copy .env example file as base
  copy:
    src: "{{ backend_dir }}/{{ env_file_source }}"
    dest: "{{ backend_dir }}/{{ env_file_dest }}"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0600'
    remote_src: yes

- name: Generate Django secret key
  set_fact:
    generated_secret_key: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=50') }}"

- name: Build ALLOWED_HOSTS and CORS origins
  set_fact:
    allowed_hosts_list: "{{ ansible_host }},localhost,127.0.0.1,.cloudfront.net{% if cdn_domain is defined and cdn_domain %},{{ cdn_domain }}{% endif %}"
    cors_origins: "http://{{ ansible_host }}{% if cdn_domain is defined and cdn_domain %},https://{{ cdn_domain }}{% endif %}"
    frontend_url: "{% if cdn_domain is defined and cdn_domain %}https://{{ cdn_domain }}{% else %}http://{{ ansible_host }}{% endif %}"

- name: Create .claude directory for credentials (non-prod only)
  file:
    path: "/home/{{ app_user }}/.claude"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0700'
  when: env_name != 'prod'

- name: Restore Claude credentials from GitHub Secret (non-prod only)
  copy:
    content: "{{ claude_credentials_json | b64decode }}"
    dest: "/home/{{ app_user }}/.claude/.credentials.json"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0600'
  when: env_name != 'prod' and claude_credentials_json is defined and claude_credentials_json != ''

# Claude SDK will automatically read from ~/.claude/.credentials.json
# when HOME=/home/app is set in systemd service (which we configured)
# Both CLI tool and SDK will use this file for authentication
# No need to extract token to environment variable!

- name: Populate Django settings in .env file
  lineinfile:
    path: "{{ backend_dir }}/{{ env_file_dest }}"
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0600'
  loop:
    - { regexp: '^SECRET_KEY=', line: 'SECRET_KEY={{ generated_secret_key }}' }
    - { regexp: '^ALLOWED_HOSTS=', line: 'ALLOWED_HOSTS={{ allowed_hosts_list }}' }
    - { regexp: '^DB_NAME=', line: 'DB_NAME={{ database_name }}' }
    - { regexp: '^DB_USER=', line: 'DB_USER={{ database_user }}' }
    - { regexp: '^DB_PASSWORD=', line: 'DB_PASSWORD={{ database_password }}' }
    - { regexp: '^DB_HOST=', line: 'DB_HOST={{ database_host }}' }
    - { regexp: '^DB_PORT=', line: 'DB_PORT={{ database_port }}' }
    - { regexp: '^REDIS_URL=', line: 'REDIS_URL=redis://{{ cache_host }}:{{ cache_port }}/0' }
    - { regexp: '^EXTRA_CORS_ORIGINS=', line: 'EXTRA_CORS_ORIGINS={{ cors_origins }}' }
    - { regexp: '^EXTRA_CSRF_ORIGINS=', line: 'EXTRA_CSRF_ORIGINS={{ cors_origins }}' }
    - { regexp: '^FRONTEND_URL=', line: 'FRONTEND_URL={{ frontend_url }}' }
    - { regexp: '^WEBAPP_ORIGIN=', line: 'WEBAPP_ORIGIN={{ frontend_url }}' }

# No need to populate CLAUDE_CODE_OAUTH_TOKEN in .env
# SDK reads directly from ~/.claude/.credentials.json when HOME is set correctly

- name: Populate Dodo Payments credentials
  lineinfile:
    path: "{{ backend_dir }}/{{ env_file_dest }}"
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0600'
  loop:
    - { regexp: '^DODO_PAYMENTS_API_KEY=', line: 'DODO_PAYMENTS_API_KEY={{ dodo_api_key }}' }
    - { regexp: '^DODO_WEBHOOK_SECRET=', line: 'DODO_WEBHOOK_SECRET={{ dodo_webhook_secret }}' }
    - { regexp: '^DODO_PRODUCT_ID_PRO=', line: 'DODO_PRODUCT_ID_PRO={{ dodo_product_id_pro }}' }
    - { regexp: '^DODO_PRODUCT_ID_TEAM=', line: 'DODO_PRODUCT_ID_TEAM={{ dodo_product_id_team }}' }
    - { regexp: '^DODO_PRODUCT_ID_BUSINESS=', line: 'DODO_PRODUCT_ID_BUSINESS={{ dodo_product_id_business }}' }
  when: dodo_api_key is defined and dodo_api_key != ''

- name: Populate AWS SES email configuration (only if explicitly provided)
  lineinfile:
    path: "{{ backend_dir }}/{{ env_file_dest }}"
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0600'
  loop:
    - { regexp: '^USE_SES=', line: 'USE_SES={{ use_ses }}' }
    - { regexp: '^AWS_SES_REGION=', line: 'AWS_SES_REGION={{ aws_ses_region }}' }
    - { regexp: '^DEFAULT_FROM_EMAIL=', line: 'DEFAULT_FROM_EMAIL={{ default_from_email }}' }
  when: use_ses is defined and use_ses != ''

- name: Populate GitHub OAuth credentials
  lineinfile:
    path: "{{ backend_dir }}/{{ env_file_dest }}"
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0600'
  loop:
    - { regexp: '^GITHUB_CLIENT_ID=', line: 'GITHUB_CLIENT_ID={{ github_client_id }}' }
    - { regexp: '^GITHUB_CLIENT_SECRET=', line: 'GITHUB_CLIENT_SECRET={{ github_client_secret }}' }
  when: github_client_id is defined and github_client_id != ''

- name: Create production settings override
  template:
    src: settings_prod.py.j2
    dest: "{{ backend_dir }}/copilot_orchestrator/settings_prod.py"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0644'

- name: Create Python virtual environment
  command: python3 -m venv {{ backend_dir }}/venv
  args:
    creates: "{{ backend_dir }}/venv/bin/activate"
  become: yes
  become_user: "{{ app_user }}"

- name: Install Python dependencies
  pip:
    requirements: "{{ backend_dir }}/requirements.txt"
    virtualenv: "{{ backend_dir }}/venv"
  become: yes
  become_user: "{{ app_user }}"

- name: Remove old Node.js packages (non-prod only)
  apt:
    name:
      - nodejs
      - npm
    state: absent
    purge: yes
    autoremove: yes
  when: env_name != 'prod'

- name: Download and run NodeSource setup script for Node.js 20 LTS (non-prod only)
  shell: |
    curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
  args:
    creates: /etc/apt/sources.list.d/nodesource.sources
  when: env_name != 'prod'

- name: Install Node.js 20 (includes npm) for Claude CLI (non-prod only)
  apt:
    name:
      - nodejs
    state: present
    update_cache: yes
  when: env_name != 'prod'

- name: Install Claude CLI via npm (non-prod only)
  npm:
    name: "@anthropic-ai/claude-code"
    global: yes
    state: present
  when: env_name != 'prod'

- name: Create static files directory
  file:
    path: "{{ backend_dir }}/staticfiles"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'

- name: Create media files directory
  file:
    path: "{{ backend_dir }}/media"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'

- name: Create workspace directories
  file:
    path: "{{ backend_dir }}/data/{{ item }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'
  loop:
    - projects
    - workspaces

- name: Wait for database to be ready
  command: >
    {{ backend_dir }}/venv/bin/python -c
    "import psycopg2; psycopg2.connect(
    host='{{ database_host }}',
    port={{ database_port }},
    user='{{ database_user }}',
    password='{{ database_password }}',
    dbname='{{ database_name }}'
    ).close()"
  register: db_check
  until: db_check.rc == 0
  retries: 30
  delay: 10
  become: yes
  become_user: "{{ app_user }}"

- name: Clean up orphaned PostgreSQL types before migration
  postgresql_query:
    login_host: "{{ database_host }}"
    login_port: "{{ database_port }}"
    login_user: "{{ database_user }}"
    login_password: "{{ database_password }}"
    db: "{{ database_name }}"
    query: |
      DO $$
      DECLARE
        type_exists boolean;
        table_exists boolean;
      BEGIN
        -- Check if interpreter_user type exists
        SELECT EXISTS (
          SELECT 1 FROM pg_type WHERE typname = 'interpreter_user'
        ) INTO type_exists;

        -- Check if interpreter_user table exists
        SELECT EXISTS (
          SELECT 1 FROM pg_tables WHERE schemaname = 'public' AND tablename = 'interpreter_user'
        ) INTO table_exists;

        -- If type exists but table doesn't, drop all orphaned types
        IF type_exists AND NOT table_exists THEN
          RAISE NOTICE 'Orphaned types detected, cleaning up...';
          DROP TYPE IF EXISTS interpreter_user CASCADE;
          DROP TYPE IF EXISTS interpreter_tenant CASCADE;
          DROP TYPE IF EXISTS interpreter_project CASCADE;
          DROP TYPE IF EXISTS interpreter_clientserverconversation CASCADE;
          DROP TYPE IF EXISTS interpreter_clientserverturn CASCADE;
          DROP TYPE IF EXISTS interpreter_serveraiconversation CASCADE;
          DROP TYPE IF EXISTS interpreter_serveraiturn CASCADE;
          DROP TYPE IF EXISTS interpreter_action CASCADE;
          RAISE NOTICE 'Orphaned types cleaned up successfully';
        ELSE
          RAISE NOTICE 'No orphaned types found, proceeding with migration';
        END IF;
      END $$;
  run_once: true
  ignore_errors: yes
  become: yes
  become_user: "{{ app_user }}"

- name: Run Django migrations
  django_manage:
    command: migrate
    app_path: "{{ backend_dir }}"
    virtualenv: "{{ backend_dir }}/venv"
  run_once: true
  become: yes
  become_user: "{{ app_user }}"
  environment:
    DJANGO_SETTINGS_MODULE: "{{ django_settings_module }}"
    DB_NAME: "{{ database_name }}"
    DB_USER: "{{ database_user }}"
    DB_PASSWORD: "{{ database_password }}"
    DB_HOST: "{{ database_host }}"
    DB_PORT: "{{ database_port }}"
    REDIS_URL: "redis://{{ cache_host }}:{{ cache_port }}/0"
    SECRET_KEY: "{{ django_secret_key }}"
    ALLOWED_HOSTS: "{{ django_allowed_hosts }}"
    DEBUG: "False"
    STATIC_ROOT: "{{ backend_dir }}/staticfiles"
    MEDIA_ROOT: "{{ backend_dir }}/media"

- name: Collect static files
  django_manage:
    command: collectstatic --noinput
    app_path: "{{ backend_dir }}"
    virtualenv: "{{ backend_dir }}/venv"
  become: yes
  become_user: "{{ app_user }}"
  environment:
    DJANGO_SETTINGS_MODULE: "{{ django_settings_module }}"
    DB_NAME: "{{ database_name }}"
    DB_USER: "{{ database_user }}"
    DB_PASSWORD: "{{ database_password }}"
    DB_HOST: "{{ database_host }}"
    DB_PORT: "{{ database_port }}"
    REDIS_URL: "redis://{{ cache_host }}:{{ cache_port }}/0"
    SECRET_KEY: "{{ django_secret_key }}"
    ALLOWED_HOSTS: "{{ django_allowed_hosts }}"
    DEBUG: "False"
    STATIC_ROOT: "{{ backend_dir }}/staticfiles"
    MEDIA_ROOT: "{{ backend_dir }}/media"

- name: Create systemd service files
  template:
    src: "{{ item }}.service.j2"
    dest: "/etc/systemd/system/{{ item }}.service"
    mode: '0644'
  loop:
    - coco-daphne
    - coco-celery-worker
    - coco-celery-beat
    - coco-grpc-agent
  notify:
    - reload systemd
    - restart services

- name: Enable and restart services
  systemd:
    name: "{{ item }}"
    enabled: yes
    state: restarted
    daemon_reload: yes
  loop:
    - coco-daphne
    - coco-celery-worker
    - coco-celery-beat
    - coco-grpc-agent
  ignore_errors: yes
