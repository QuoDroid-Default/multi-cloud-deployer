---
# Docker Installation Role
# Installs Docker Engine for test execution in non-prod environments

- name: Install Docker dependencies
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: yes
  become: yes

- name: Create keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: yes

- name: Add Docker GPG key
  shell: |
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg
  become: yes

- name: Set Docker architecture
  set_fact:
    docker_arch: "{{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' if ansible_architecture == 'aarch64' else ansible_architecture }}"

- name: Add Docker repository
  apt_repository:
    repo: "deb [arch={{ docker_arch }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker
  become: yes

- name: Install Docker Engine
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes
  become: yes

- name: Ensure Docker service is started and enabled
  systemd:
    name: docker
    state: started
    enabled: yes
  become: yes

- name: Add application user to docker group
  user:
    name: "{{ app_user | default('ubuntu') }}"
    groups: docker
    append: yes
  become: yes

- name: Check if test-runner source exists in backend directory
  stat:
    path: "{{ backend_dir }}/test-runner/Dockerfile"
  register: test_runner_dockerfile
  when: backend_dir is defined

- name: Clean up Docker system before build to free disk space
  command: docker system prune -a -f --volumes
  become: yes
  when:
    - backend_dir is defined
    - test_runner_dockerfile.stat.exists
  register: docker_cleanup
  changed_when: docker_cleanup.stdout is search('Total reclaimed space')

- name: Display cleanup results
  debug:
    msg: "{{ docker_cleanup.stdout_lines | default(['No cleanup needed']) }}"
  when: docker_cleanup is defined

- name: Display test-runner source location
  debug:
    msg: "Test runner source found at {{ backend_dir }}/test-runner/"
  when:
    - backend_dir is defined
    - test_runner_dockerfile.stat.exists

- name: Build custom test runner image locally on EC2
  community.docker.docker_image:
    name: coco-test-runner
    tag: latest
    source: build
    build:
      path: "{{ backend_dir }}/test-runner"
      pull: yes
    state: present
    force_source: yes
  become: yes
  when:
    - backend_dir is defined
    - test_runner_dockerfile.stat.exists
  register: docker_build_result

- name: Display build result
  debug:
    msg: |
      ✅ Custom test runner image built successfully!
      Image ID: {{ docker_build_result.image.Id | default('unknown') }}
      Image will be used by Django DockerTestExecutor
  when:
    - docker_build_result is defined
    - docker_build_result.changed

- name: Pull Microsoft Playwright image as fallback
  community.docker.docker_image:
    name: mcr.microsoft.com/playwright/python:v1.40.0-jammy
    source: pull
    state: present
  become: yes
  when:
    - backend_dir is not defined or not test_runner_dockerfile.stat.exists
  ignore_errors: yes
  register: fallback_image_pull

- name: Warn if using fallback image
  debug:
    msg: |
      ⚠️  Warning: Using Microsoft Playwright base image as fallback
      Custom test-runner source not found at {{ backend_dir }}/test-runner/
      This image lacks custom features (boto3, ecs_runner, etc.)
  when:
    - fallback_image_pull is defined
    - fallback_image_pull.changed

- name: Create test execution directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ app_user | default('ubuntu') }}"
    group: "{{ app_user | default('ubuntu') }}"
    mode: '0755'
  loop:
    - /var/lib/coco-testai/test-scripts
    - /var/lib/coco-testai/test-results
  become: yes

- name: Verify Docker installation
  command: docker --version
  register: docker_version
  changed_when: false

- name: Display Docker version
  debug:
    msg: "Docker installed: {{ docker_version.stdout }}"
